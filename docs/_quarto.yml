project:
  type: website
  output-dir: _site


metadata-files:
  - api/_sidebar.yml


website:
  title: "py-maidr"
  description: "A Python library that makes matplotlib, seaborn, and plotly visualizations accessible through sonification, braille, text, and AI-powered multimodal data representation."
  open-graph:
    image: "https://raw.githubusercontent.com/xability/maidr/refs/heads/main/media/logo.jpg"
    locale: en_US
    site-name: "py-maidr Documentation"
  twitter-card:
    card-style: summary
    image: "https://raw.githubusercontent.com/xability/maidr/refs/heads/main/media/logo.jpg"
    image-alt: "MAIDR logo - Data Insight for All"
    site: "@seo_jooyoung"
    creator: "@seo_jooyoung"
  # GA4 for traffic analytics
  google-analytics: "G-TL8SVL5VRE"
  # Cookie consent banner (GDPR compliance) — gates GA4 and Clarity
  cookie-consent:
    type: express
    style: simple
    palette: light

  site-url: https://py.maidr.ai/
  repo-url: https://github.com/xability/py-maidr
  issue-url: https://github.com/xability/py-maidr/issues/new/choose
  repo-actions: [issue]

  page-navigation: true
  bread-crumbs: true

  navbar:
    background: light
    # logo: quarto.png
    logo-alt: "Maidr logo."
    logo-href: https://py.maidr.ai/
    title: py-maidr
    collapse-below: lg
    left:
      - file: index.qmd
        text: "Welcome"
      - text: "Examples"
        menu:
          - text: "Matplotlib / Seaborn"
            href: examples.qmd
          - text: "Plotly"
            href: examples-plotly.qmd
      - text: "API Reference"
        href: api/
    right:
      - icon: github
        href: https://github.com/xability/py-maidr
        aria-label: GitHub

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    link-external-icon: true
    link-external-newwindow: true
    link-external-filter: '^(?:http:|https:)'
    # Clarity for session recordings and heatmaps
    include-in-header:
      - text: |
          <script type="text/plain" cookie-consent="tracking">
            (function(c,l,a,r,i,t,y){
              c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
              t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
              y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
            })(window, document, "clarity", "script", "vwqybbep0i");
